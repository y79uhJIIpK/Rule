ruleset=节点选择,[]GEOSITE,deepseek
; ipleak
;ruleset=ipleak,https://raw.githubusercontent.com/y79uhJIIpK/Rule/refs/heads/main/Web_site_list/ipleak.list
; 品葱
ruleset=Cloudflare节点组,https://raw.githubusercontent.com/y79uhJIIpK/Rule/refs/heads/main/Web_site_list/Pincong.list
; PTT_批踢踢實業坊
;ruleset=PTT,[]GEOSITE,ptt
