ruleset=Cloudflare节点组,https://raw.githubusercontent.com/y79uhJIIpK/Rule/refs/heads/main/Web_site_list/RFA.list
; SpeedTest
ruleset=SpeedTest,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/refs/heads/master/rule/Clash/Speedtest/Speedtest.list
; TikTok
ruleset=节点选择,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/refs/heads/master/rule/Clash/TikTok/TikTok.list
; VOA
ruleset=Cloudflare节点组,[]GEOSITE,voanews
; Xiaohongshu
ruleset=节点选择,[]GEOSITE,xiaohongshu

; DirectGame
;ruleset=DIRECT,[]GEOSITE,category-games@cn
; ProxyGame
;ruleset=节点选择,[]GEOSITE,category-games

ruleset=日本IP,[]GEOIP,JP,no-resolve

ruleset=节点选择,[]GEOSITE,geolocation-!cn

ruleset=DIRECT,[]GEOSITE,cn
ruleset=DIRECT,[]GEOIP,CN,no-resolve

ruleset=节点选择,[]FINAL
;-----------------
custom_proxy_group=节点选择`select`[]美国故转`!!GROUPID=1
custom_proxy_group=AppleDirect`select`[]DIRECT`[]节点选择
;custom_proxy_group=Bahamut`select`[]台湾故转
;custom_proxy_group=BrowserLeaks`select`[]节点选择`.*
;custom_proxy_group=ipleak`select`[]节点选择`.*
;custom_proxy_group=PTT`select`[]台湾故转`[]节点选择
custom_proxy_group=SpeedTest`select`[]DIRECT`[]节点选择`.*

custom_proxy_group=日本IP`select`[]日本故转`!!GROUPID=1!!(日本)`!!GROUPID=2!!(日本)`[]节点选择

custom_proxy_group=美国故转`fallback`!!GROUPID=1!!(美国)`!!GROUPID=2!!(美国)`http://www.gstatic.com/generate_204`60,5
custom_proxy_group=香港故转`fallback`!!GROUPID=1!!(香港)`!!GROUPID=2!!(香港)`http://www.gstatic.com/generate_204`60,5
custom_proxy_group=台湾故转`fallback`!!GROUPID=1!!(台湾)`!!GROUPID=2!!(台湾)`http://www.gstatic.com/generate_204`60,5
custom_proxy_group=日本故转`fallback`!!GROUPID=1!!(日本)`!!GROUPID=2!!(日本)`http://www.gstatic.com/generate_204`60,5
custom_proxy_group=新加坡故转`fallback`!!GROUPID=1!!(狮城)`!!GROUPID=2!!(新加坡)`http://www.gstatic.com/generate_204`60,5


custom_proxy_group=Cloudflare节点组`url-test`!!GROUPID=0`http://www.gstatic.com/generate_204`60,5

; 别动
enable_rule_generator=true
overwrite_original_rules=true
